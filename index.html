<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game & App Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
        }

        .navbar {
            background-color: #2c3e50;
            padding: 8px 20px;
            position: relative;
        }

        .navbar-brand, .nav-link {
            color: white !important;
        }

        .navbar-toggler {
            background-color: transparent;
            border: none;
            z-index: 1100;
        }

        .navbar-toggler-icon {
            background-color: white;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: -250px;
            background-color: #34495e;
            transition: 0.3s;
            z-index: 1000;
        }

        .sidebar.show {
            left: 0;
        }

        .sidebar .logo-section {
            padding: 20px;
            text-align: center;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
            border-bottom: 1px solid #2c3e50;
        }

        .sidebar a:hover {
            background-color: #1abc9c; /* Teal */
        }

        .content {
            margin-left: 0;
            transition: margin-left 0.3s;
            padding: 20px;
        }

        .content.shifted {
            margin-left: 250px;
        }

        .header-section {
            background-color: #2980b9;
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .card {
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: white;
        }

        .card-body {
            text-align: center;
        }

        .card-title {
            color: #2c3e50;
        }

        .btn-primary {
            background-color: #3498db;
            border: none;
            padding: 10px 20px;
            width: 100%;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn-primary:hover {
            background-color: #1d7ab9;
        }

        /* Handwritten Button in the Topbar */
        .btn-handwritten {
            font-family: 'Shadows Into Light', cursive;
            background-color: #f39c12;
            border: none;
            padding: 12px 25px;
            color: white;
            font-size: 18px;
            text-transform: none;
            border-radius: 5px;
            cursor: pointer;
            position: absolute;
            top: 12px;
            right: 20px;
        }

        .btn-handwritten:hover {
            background-color: #e67e22;
        }

    </style>
</head>
<body>

    <!-- Navbar with Toggle Button -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" id="sidebarToggle">
                <span class="navbar-toggler-icon"></span> <!-- Three-line icon -->
            </button>
            <a class="navbar-brand" href="#">Game & App Store</a>
            <!-- Handwritten Button in the Topbar -->
            <button class="btn btn-handwritten">Handwritten Button</button>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="logo-section">
            <img src="https://via.placeholder.com/150" alt="Logo"> <!-- Placeholder for Logo -->
            <h3>R-verse</h3>
        </div>
        <ul class="nav flex-column pt-4">
            <li class="nav-item">
                <a class="nav-link text-white p-3" href="#">🏠 Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white p-3" href="#">🎮 Games</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white p-3" href="#">📱 Apps</a>
            </li>
        </ul>
    </div>

    <!-- Content -->
    <div class="content" id="content">
        <div class="container mt-5">
            <h1>Game Store</h1>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Game 1</h5>
                            <button class="btn btn-primary">Play</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toggle Sidebar functionality
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            const sidebar = document.getElementById('sidebar');
            const content = document.getElementById('content');
            
            sidebar.classList.toggle('show');
            content.classList.toggle('shifted');
        });
    </script>

    <!-- Bootstrap JS and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

</body>
</html>
