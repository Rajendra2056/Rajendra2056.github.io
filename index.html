<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game & App Store</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <!-- FontAwesome CDN -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa;
        }
/* Navbar styling */









        .sidebar {
    background-color: #34495e;
    color: white;
    width: 250px;
    position: fixed;
    top: 0;
    left: -250px;
    height: 100%;
    padding-top: 20px;
    transition: all 0.3s;
}

        .sidebar.show {
            left: 0;
        }

        .sidebar .logo-section {
            padding: 20px;
            text-align: center;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
            border-bottom: 1px solid #2c3e50;
            font-family: 'Poppins', sans-serif;
        }

        .sidebar a:hover {
            background-color: #1abc9c;
        }

        /* Content styling */
.content {
    margin-left: 0;
    padding: 30px;
    transition: margin-left 0.3s;
}

.content.show {
    margin-left: 250px; /* Add this to shift content when sidebar is visible */
}

        .header-section {
            background-color: #2980b9;
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .card {
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: white;
        }

        .card-body {
            text-align: center;
        }

        .card-title {
            color: #2c3e50;
        }

        .btn-primary {
            background-color: #3498db;
            border: none;
            padding: 10px 20px;
            width: 100%;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn-primary:hover {
            background-color: #1d7ab9;
        }

        .container-fluid {
            margin-top: 100px;
        }

        .navbar-toggler {
    display: block !important; /* Make sure it is always displayed */
    border: none;
}

        .logo-section img {
            width: 80%;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" id="toggleSidebar" aria-label="Toggle Sidebar">
                <i class="fas fa-bars"></i> <!-- FontAwesome Hamburger Icon -->
            </button>
            
            <a class="navbar-brand" href="#">Game & App Store</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Games</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Apps</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Top Charts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Categories</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Settings</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="logo-section">
            <img src="https://via.placeholder.com/150" alt="Logo">
            <h3>R-verse</h3>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link" href="#">🏠 Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">🎮 Games</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">📱 Apps</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">⭐ Top Charts</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">💾 Categories</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">⚙️ Settings</a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="content" id="content">
        <section class="header-section">
            <h1>Discover the Best Games & Apps</h1>
            <p>Explore endless entertainment at your fingertips.</p>
        </section>

        <section class="container py-5">
            <h2 class="mb-4">Top Games</h2>
            <div class="row g-4">
                <div class="col-md-3">
                    <div class="card">
                        <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 1">
                        <div class="card-body">
                            <h5 class="card-title">Game 1</h5>
                            <button class="btn btn-primary">Play</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card">
                        <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 2">
                        <div class="card-body">
                            <h5 class="card-title">Game 2</h5>
                            <button class="btn btn-primary">Play</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card">
                        <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 3">
                        <div class="card-body">
                            <h5 class="card-title">Game 3</h5>
                            <button class="btn btn-primary">Play</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card">
                        <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 4">
                        <div class="card-body">
                            <h5 class="card-title">Game 4</h5>
                            <button class="btn btn-primary">Play</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Bootstrap JS and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const toggleSidebar = document.getElementById('toggleSidebar');
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('content');

        toggleSidebar.addEventListener('click', function () {
            sidebar.classList.toggle('show');
            content.classList.toggle('show');
        });
    </script>
</body>
</html>
