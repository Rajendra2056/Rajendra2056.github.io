<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cool Play Store UI</title>

  <!-- Bootstrap CSS -->
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
    }

    .hero {
      background-color: #ff4081;
      color: white;
      padding: 50px 20px;
      text-align: center;
    }

    .category-card img {
      width: 100%;
      border-radius: 8px;
    }

    .trending-item img {
      width: 100%;
      border-radius: 8px;
    }

    footer {
      background-color: #6200ea;
      color: white;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="bg-primary text-white py-3">
    <nav class="navbar navbar-expand-lg navbar-light">
      <a class="navbar-brand" href="#">Cool Play Store</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item active"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Games</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Apps</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Movies</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Books</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Welcome to the Cool Play Store</h1>
    <p>Discover the best apps and games for your phone</p>
  </section>

  <!-- Featured Categories Section -->
  <section class="container my-5 text-center">
    <h2>Featured Categories</h2>
    <div class="row">
      <div class="col-md-4 mb-4">
        <div class="card category-card">
          <img src="https://via.placeholder.com/300" class="card-img-top" alt="Games Category">
          <div class="card-body">
            <p class="card-text">Games</p>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-4">
        <div class="card category-card">
          <img src="https://via.placeholder.com/300" class="card-img-top" alt="Apps Category">
          <div class="card-body">
            <p class="card-text">Apps</p>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-4">
        <div class="card category-card">
          <img src="https://via.placeholder.com/300" class="card-img-top" alt="Movies Category">
          <div class="card-body">
            <p class="card-text">Movies</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Trending Section -->
  <section class="container my-5 text-center">
    <h2>Trending Apps & Games</h2>
    <div class="row">
      <div class="col-md-4 mb-4">
        <div class="card trending-item">
          <img src="https://via.placeholder.com/300" class="card-img-top" alt="App 1">
          <div class="card-body">
            <p class="card-text">App 1</p>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-4">
        <div class="card trending-item">
          <img src="https://via.placeholder.com/300" class="card-img-top" alt="App 2">
          <div class="card-body">
            <p class="card-text">App 2</p>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-4">
        <div class="card trending-item">
          <img src="https://via.placeholder.com/300" class="card-img-top" alt="App 3">
          <div class="card-body">
            <p class="card-text">App 3</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2024 Cool Play Store. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS, Popper.js, and jQuery -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

  <script>
    // Simple click event for category cards
    document.querySelectorAll('.category-card').forEach(card => {
      card.addEventListener('click', () => {
        alert(`You clicked on ${card.querySelector('.card-text').textContent}`);
      });
    });
  </script>

</body>
</html>
