<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game & App Store</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <!-- Toggle button for sidebar -->
            <button class="navbar-toggler" type="button" id="toggleSidebar" aria-label="Toggle Sidebar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand" href="#">Game & App Store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Games</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Apps</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Top Charts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Categories</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Settings</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="d-flex">
        <!-- Sidebar -->
        <div class="bg-dark text-white p-3" style="width: 250px;" id="sidebar">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link text-white" href="#">🏠 Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="#">🎮 Games</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="#">📱 Apps</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="#">⭐ Top Charts</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="#">💾 Categories</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="#">⚙️ Settings</a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="container-fluid p-4" id="content" style="margin-left: 250px;">
            <section class="text-center p-5" style="background-color: #2980b9; color: white;">
                <h1>Discover the Best Games & Apps</h1>
                <p>Explore endless entertainment at your fingertips.</p>
            </section>

            <section class="container py-5">
                <h2 class="mb-4">Top Games</h2>
                <div class="row g-4">
                    <div class="col-md-3">
                        <div class="card">
                            <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 1">
                            <div class="card-body">
                                <h5 class="card-title">Game 1</h5>
                                <button class="btn btn-primary w-100">Install</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 2">
                            <div class="card-body">
                                <h5 class="card-title">Game 2</h5>
                                <button class="btn btn-primary w-100">Install</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 3">
                            <div class="card-body">
                                <h5 class="card-title">Game 3</h5>
                                <button class="btn btn-primary w-100">Install</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 4">
                            <div class="card-body">
                                <h5 class="card-title">Game 4</h5>
                                <button class="btn btn-primary w-100">Install</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Bootstrap JS and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

    <script>
        // Toggle Sidebar functionality
        const toggleSidebar = document.getElementById('toggleSidebar');
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('content');

        toggleSidebar.addEventListener('click', function () {
            sidebar.classList.toggle('d-none');
            content.style.marginLeft = sidebar.classList.contains('d-none') ? '0' : '250px';
        });
    </script>

</body>
</html>
