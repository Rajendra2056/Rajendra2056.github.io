<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game & App Store</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            overflow-x: hidden;
        }
        /* Navbar Styling */
        .navbar {
            background-color: #343a40;
        }
        .navbar-brand {
            font-weight: bold;
        }
        .navbar-nav .nav-link {
            color: #f8f9fa !important;
        }
        .navbar-nav .nav-link:hover {
            color: #f1c40f !important;
        }
        /* Sidebar Styling */
        #sidebar {
            width: 250px;
            height: 100vh;
            background-color: #2c3e50;
            position: fixed;
            transition: margin-left 0.3s ease;
        }
        #sidebar .nav-link {
            color: #ecf0f1;
        }
        #sidebar .nav-link:hover {
            color: #f1c40f;
        }
        #sidebar.collapsed {
            margin-left: -250px;
        }
        /* Main Content Area */
        .content {
            transition: margin-left 0.3s ease;
        }
        .content.collapsed {
            margin-left: 0;
        }
        .hero-section {
            background-color: #2980b9;
            color: white;
            padding: 60px 20px;
        }
        .card-title {
            font-size: 1.2rem;
        }
        .btn-primary {
            background-color: #2980b9;
            border-color: #2980b9;
        }
        .btn-primary:hover {
            background-color: #1c5980;
            border-color: #1c5980;
        }
    </style>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand text-white" href="#">Game & App Store</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Games</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Apps</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Top Charts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Categories</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Settings</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="d-flex">
        <!-- Sidebar -->
        <nav id="sidebar" class="bg-dark text-white p-3">
            <button class="btn btn-dark text-white w-100 mb-3" id="toggleSidebar">☰ Toggle Sidebar</button>
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link" href="#">🏠 Home</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="#">🎮 Games</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="#">📱 Apps</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="#">⭐ Top Charts</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="#">💾 Categories</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="#">⚙️ Settings</a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4 content" id="content">
            <!-- Hero Section -->
            <section class="hero-section text-center">
                <h1>Discover the Best Games & Apps</h1>
                <p>Explore endless entertainment at your fingertips.</p>
            </section>

            <!-- Games Section -->
            <section class="container py-5">
                <h2 class="mb-4">Top Games</h2>
                <div class="row g-4">
                    <div class="col-md-3">
                        <div class="card">
                            <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 1">
                            <div class="card-body">
                                <h5 class="card-title">Game 1</h5>
                                <button class="btn btn-primary w-100">Install</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 2">
                            <div class="card-body">
                                <h5 class="card-title">Game 2</h5>
                                <button class="btn btn-primary w-100">Install</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 3">
                            <div class="card-body">
                                <h5 class="card-title">Game 3</h5>
                                <button class="btn btn-primary w-100">Install</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 4">
                            <div class="card-body">
                                <h5 class="card-title">Game 4</h5>
                                <button class="btn btn-primary w-100">Install</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const toggleSidebar = document.getElementById('toggleSidebar');
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('content');

        toggleSidebar.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');  // Toggle sidebar visibility
            content.classList.toggle('collapsed'); // Adjust content area when sidebar is collapsed
        });
    </script>
</body>
</html>
