<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game & App Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: -250px;
            background-color: #2c3e50;
            transition: 0.3s;
            z-index: 1000;
        }

        .sidebar.show {
            left: 0;
        }

        .sidebar-toggle {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1100;
            background: #3498db;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
        }

        .content {
            margin-left: 0;
            transition: margin-left 0.3s;
        }

        .content.shifted {
            margin-left: 250px;
        }
    </style>
</head>
<body>
    <!-- Sidebar Toggle Button -->
    <button id="sidebarToggle" class="sidebar-toggle">☰ Menu</button>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <ul class="nav flex-column pt-4">
            <li class="nav-item">
                <a class="nav-link text-white p-3" href="#">🏠 Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white p-3" href="#">🎮 Games</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white p-3" href="#">📱 Apps</a>
            </li>
        </ul>
    </div>

    <!-- Content -->
    <div class="content" id="content">
        <div class="container mt-5">
            <h1>Game Store</h1>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Game 1</h5>
                            <button class="btn btn-primary">Play</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            const sidebar = document.getElementById('sidebar');
            const content = document.getElementById('content');
            
            sidebar.classList.toggle('show');
            content.classList.toggle('shifted');
        });
    </script>
</body>
</html>
