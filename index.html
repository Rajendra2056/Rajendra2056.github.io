<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game & App Store</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom Styles */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa; /* Light Gray background */
        }

        .navbar {
            background-color: #2c3e50; /* Navy Blue */
        }

        .navbar-brand, .nav-link {
            color: white !important;
        }

        .navbar-toggler-icon {
            background-color: white;
        }

        .sidebar {
            background-color: #34495e; /* Dark Grayish Blue */
            color: white;
            width: 250px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            padding-top: 20px;
            transition: all 0.3s;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
            border-bottom: 1px solid #2c3e50;
        }

        .sidebar a:hover {
            background-color: #1abc9c; /* Teal */
        }

        .content {
            margin-left: 250px;
            padding: 30px;
        }

        .header-section {
            background-color: #2980b9; /* Blue */
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .card {
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: white;
        }

        .card-body {
            text-align: center;
        }

        .card-title {
            color: #2c3e50; /* Darker Text */
        }

        .btn-primary {
            background-color: #3498db; /* Blue */
            border: none;
            padding: 10px 20px;
            width: 100%;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn-primary:hover {
            background-color: #1d7ab9; /* Darker Blue */
        }

        .container-fluid {
            margin-top: 100px;
        }

        /* Sidebar toggle */
        .sidebar.d-none {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" id="toggleSidebar" aria-label="Toggle Sidebar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand" href="#">Game & App Store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Games</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Apps</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Top Charts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Categories</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Settings</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link" href="#">🏠 Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">🎮 Games</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">📱 Apps</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">⭐ Top Charts</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">💾 Categories</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">⚙️ Settings</a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="content" id="content">
        <section class="header-section">
            <h1>Discover the Best Games & Apps</h1>
            <p>Explore endless entertainment at your fingertips.</p>
        </section>

        <section class="container py-5">
            <h2 class="mb-4">Top Games</h2>
            <div class="row g-4">
                <div class="col-md-3">
                    <div class="card">
                        <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 1">
                        <div class="card-body">
                            <h5 class="card-title">Game 1</h5>
                            <button class="btn btn-primary">Play</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card">
                        <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 2">
                        <div class="card-body">
                            <h5 class="card-title">Game 2</h5>
                            <button class="btn btn-primary">Play</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card">
                        <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 3">
                        <div class="card-body">
                            <h5 class="card-title">Game 3</h5>
                            <button class="btn btn-primary">Play</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card">
                        <img src="https://via.placeholder.com/150" class="card-img-top" alt="Game 4">
                        <div class="card-body">
                            <h5 class="card-title">Game 4</h5>
                            <button class="btn btn-primary">Play</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Bootstrap JS and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

    <script>
        // Toggle Sidebar functionality
        const toggleSidebar = document.getElementById('toggleSidebar');
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('content');

        toggleSidebar.addEventListener('click', function () {
            sidebar.classList.toggle('d-none');
            content.style.marginLeft = sidebar.classList.contains('d-none') ? '0' : '250px';
        });
    </script>

</body>
</html>
